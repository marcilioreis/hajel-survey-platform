version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: surveypass
      POSTGRES_DB: survey_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://survey:surveypass@postgres:5432/survey_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  pgdata: